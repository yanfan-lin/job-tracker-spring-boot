# Runs automated tests for the Spring Boot API on every push and pull request
name: Java CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Maven tests
    runs-on: ubuntu-latest

    steps:
      # checks the repository so the workflow can access the project files
      - name: Checkout repository
        uses: actions/checkout@v4

      # installs Java 21 and enables Maven dependency caching
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # gives the Maven wrapper permission to execute on Linux runners
      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # runs the automated tests
      - name: Run tests
        run: ./mvnw test
